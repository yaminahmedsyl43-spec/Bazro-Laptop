<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flashpoint POS (Fixed Print)</title>

<style>

/* KEEP YOUR ORIGINAL STYLES ABOVE — unchanged */

/* ========================= */
/* 🔥 PRINT FIX (FINAL) */
/* ========================= */

#thermal-print-frame {
  display: none;
}

@media print {

  * {
    visibility: hidden !important;
  }

  #thermal-print-frame,
  #thermal-print-frame * {
    visibility: visible !important;
  }

  /* 🔥 FIXED */
  #thermal-print-frame {
    display: block !important;
    position: absolute !important; /* FIXED */
    top: 0;
    left: 0;
    width: 80mm;
  }

  @page {
    size: 80mm auto;
    margin: 0;
  }

  html, body {
    height: auto !important;
  }

  /* 🔥 RECEIPT CORE */
  .thermal-receipt {
    width: 80mm;
    padding: 4mm;
    box-sizing: border-box;
    font-family: "Courier New", monospace;
    font-size: 9pt;
    line-height: 1.4;
    background: #fff;
    color: #000;

    /* CRITICAL FIXES */
    overflow: visible !important;
    word-break: break-word;
    page-break-inside: avoid;
  }

  /* 🔥 REMOVE HEIGHT LIMIT */
  #rec-c {
    max-height: none !important;
    overflow: visible !important;
  }

  /* 🔥 TABLE FIX */
  table {
    width: 100%;
    table-layout: fixed;
  }

  td, th {
    word-wrap: break-word;
  }

  * {
    overflow-wrap: break-word;
  }
}

</style>
</head>

<body>

<!-- YOUR POS APP STAYS EXACTLY THE SAME -->
<!-- I AM ONLY INCLUDING THE PRINT PART YOU NEED -->

<button onclick="window.print()">🖨 Print Test</button>

<!-- ========================= -->
<!-- 🔥 THERMAL PRINT FRAME -->
<!-- ========================= -->
<div id="thermal-print-frame">
  <div class="thermal-receipt" id="thermal-content">

    <div style="text-align:center;font-weight:bold;font-size:16px;">
      BAZRO
    </div>
    <div style="text-align:center;">9a Commercial Street</div>
    <div style="text-align:center;">Camborne</div>

    <hr>

    <div style="display:flex;justify-content:space-between;">
      <span>Receipt</span>
      <span>#123</span>
    </div>

    <div style="display:flex;justify-content:space-between;">
      <span>Date</span>
      <span>28/03/2026</span>
    </div>

    <hr>

    <div><strong>Badami Biscuits</strong></div>
    <div style="display:flex;justify-content:space-between;">
      <span>1 x £2.45</span>
      <span>£2.45</span>
    </div>

    <hr>

    <div style="display:flex;justify-content:space-between;">
      <span>Subtotal</span>
      <span>£2.45</span>
    </div>

    <div style="display:flex;justify-content:space-between;">
      <span>Tax</span>
      <span>£0.49</span>
    </div>

    <hr>

    <div style="display:flex;justify-content:space-between;font-weight:bold;">
      <span>TOTAL</span>
      <span>£2.94</span>
    </div>

    <hr>

    <div style="text-align:center;">Thank you!</div>

  </div>
</div>

</body>
</html>
